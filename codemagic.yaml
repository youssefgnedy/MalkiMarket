workflows:
  ios-capacitor:
    name: iOS Capacitor Build

    environment:
      xcode: latest
      cocoapods: default
      node: latest

    scripts:
      - npm install
      - npx cap sync ios
      - cd ios/App
      - pod install
      - xcodebuild \
          -workspace App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos

    artifacts:
      - ios/App/build/**/*.ipa